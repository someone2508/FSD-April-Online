<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Block Level Elements</title>

    <style>
      .box {
        color: white;
        margin: 10px;

        /* IMPORTANT */
        display: inline-block;
        width: 150px;
        height: 100px;

        text-align: center;
      }

      .red {
        background: red;
      }

      .blue {
        background: blue;
      }

      .green {
        background: green;
      }
    </style>
  </head>
  <body>
    <div class="box red">Box 1</div>
    <div class="box blue">Box 2</div>
    <div class="box green">Box 3</div>
  </body>
</html>
