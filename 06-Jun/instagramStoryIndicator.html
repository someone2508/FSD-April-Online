<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Story Indicator</title>

    <style>
      .profile {
        position: relative;
        width: 100px;
        height: 100px;
        background: gray;
        border-radius: 50%;
      }

      .online {
        position: absolute;
        right: 5px;
        bottom: 5px;
        width: 20px;
        height: 20px;
        background: green;
        border-radius: 50%;
      }
    </style>
  </head>
  <body>
    <div class="profile">
      <span class="online"></span>
    </div>
  </body>
</html>
