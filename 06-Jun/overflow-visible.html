<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Overflow</title>

    <style>
      .box {
        width: 200px;
        /* keep the content in 1 single line (DO NOT WRAP) */
        white-space: nowrap;
        overflow-x: auto;
      }
    </style>
  </head>
  <body>
    <div class="box">
      Lorem ipsum dolor sit amet consectetur, adipisicing elit. Unde harum
      deserunt id blanditiis, aspernatur alias beatae cumque cupiditate quasi
      eligendi quis sed, quas, iure corporis?
    </div>
  </body>
</html>
