<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Product Badge</title>

    <style>
      .product {
        position: relative;
        width: 200px;
        height: 150px;
        border: 1px solid black;
      }

      .badge {
        position: absolute;
        top: 0px;
        right: 0px;
        background-color: red;
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="product">
      Product
      <span class="badge">New</span>
    </div>
  </body>
</html>
