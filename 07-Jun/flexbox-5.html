<html lang="en">
  <head>
    <title>Flexbox</title>

    <style>
      .container {
        display: flex;
        flex-wrap: wrap;
      }

      .container div {
        flex: 0 0 25%;
        box-sizing: border-box;
        border: 1px solid black;
        padding: 30px;
      }
    </style>
  </head>

    <div class="container">
      <div class="col1">Column 1</div>
      <div class="col2">Column 2</div>
      <div class="col3">Column 3</div>

      <div class="col1">Column 1</div>
      <div class="col2">Column 2</div>
      <div class="col3">Column 3</div>
      <div class="col4">Column 4</div>

      <div class="col2">Column 2</div>
      <div class="col3">Column 3</div>

    </div>
  </body>
</html>
