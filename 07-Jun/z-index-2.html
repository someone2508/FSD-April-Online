<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Sticky Nav</title>

    <style>
      nav {
        position: fixed;
        top: 0;

        width: 100%;

        background: black;
        color: white;

        padding: 20px;

        z-index: 100;
      }

      .someDiv {
        position: fixed;
        top: 0;

        width: 100%;

        background: black;
        color: white;

        padding: 20px;
      }

      .content {
        margin-top: 100px;
        height: 2000px;
      }
    </style>
  </head>
  <body>
    <nav>My Website</nav>

    <div class="someDiv">Hello Class</div>

    <div class="content">Lots of content......</div>
  </body>
</html>
