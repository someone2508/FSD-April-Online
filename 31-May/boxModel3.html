<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Box Model</title>

    <style>
      .normal {
        width: 300px;
        padding: 20px;
        border: 10px solid red;
      }

      .better {
        width: 300px;
        padding: 20px;
        border: 10px solid red;

        /* makes sure that the full box should be equal to the given width and height */
        box-sizing: border-box;
      }

      * {
        padding: 0px;
        margin: 0px;
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <div class="normal">BOX</div>

    <div class="better">BOX</div>
  </body>
</html>
