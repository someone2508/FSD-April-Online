<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Document</title>

    <style>
      .divTag {
        width: 100px;
        height: 100px;
        border: 5px solid black;
      }

      /* identifies the users mouse on the tag */
      .divTag:hover {
        /* transform the size by 20% inc */
        transform: scale(1.2);
      }
    </style>
  </head>
  <body>
    <div class="divTag">Hover Me</div>
  </body>
</html>
