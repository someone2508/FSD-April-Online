<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Visibility</title>

    <style>
      .box {
        width: 150px;
        height: 100px;
        color: white;
        text-align: center;
        line-height: 100px;
        margin: 10px;
      }

      .box1 {
        background-color: red;
      }

      .box2 {
        background-color: blue;
        /* visibility: hidden; */
        display: none;
      }

      .box3 {
        background-color: green;
      }
    </style>
  </head>
  <body>
    <div class="box box1">Box 1</div>
    <div class="box box2">Box 2</div>
    <div class="box box3">Box 3</div>
  </body>
</html>
